name: Flutter APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.5'
      - name: Ensure Android platform
        run: |
          if [ ! -d prototype_flutter/android ]; then
            cd prototype_flutter
            flutter create --template app .
          fi
      - name: Get dependencies
        working-directory: prototype_flutter
        run: flutter pub get
      - name: Build debug APK
        working-directory: prototype_flutter
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: prototype_flutter/build/app/outputs/flutter-apk/app-debug.apk
